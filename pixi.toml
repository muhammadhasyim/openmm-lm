# OpenMM Pixi workspace + package manifest
# Build with:  pixi install && pixi run smoke
# Full tests:  pixi run -e test test-py
# Package:     pixi build

[workspace]
name = "openmm"
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]
preview = ["pixi-build"]

[activation]
env = { OPENMM_PLUGIN_DIR = "$CONDA_PREFIX/lib/plugins" }

[dependencies]
openmm = { path = "." }

[tasks]
info = { cmd = "python -c \"import openmm as mm; print('OpenMM', mm.__version__); print('Platforms:', [mm.Platform.getPlatform(i).getName() for i in range(mm.Platform.getNumPlatforms())])\"" }
smoke = "python -m openmm.testInstallation"

# ---------------------------------------------------------------------------
# Package definition (built from this repo via pixi-build-cmake)
# ---------------------------------------------------------------------------
[package]
name = "openmm"
version = "8.5.0"

[package.build]
backend = { name = "pixi-build-cmake", version = "0.*", channels = ["https://prefix.dev/conda-forge"] }

# Base build config (overwritten per-platform — see target tables below)
[package.build.config]
compilers = ["c", "cxx"]
extra-args = [
    "-DCMAKE_BUILD_TYPE=Release",
    "-DBUILD_TESTING=OFF",
    "-DOPENMM_BUILD_PYTHON_WRAPPERS=ON",
    "-DOPENMM_PYTHON_INSTALL_TO_SITEPACKAGES=ON",
    "-DOPENMM_BUILD_SHARED_LIB=ON",
    "-DOPENMM_BUILD_CPU_LIB=ON",
    "-DOPENMM_BUILD_CUDA_LIB=OFF",
    "-DOPENMM_BUILD_OPENCL_LIB=OFF",
    "-DOPENMM_BUILD_AMOEBA_PLUGIN=ON",
    "-DOPENMM_BUILD_RPMD_PLUGIN=ON",
    "-DOPENMM_BUILD_DRUDE_PLUGIN=ON",
    "-DOPENMM_BUILD_PME_PLUGIN=ON",
    "-DOPENMM_BUILD_EXAMPLES=OFF",
    "-DOPENMM_BUILD_REFERENCE_TESTS=OFF",
    "-DOPENMM_BUILD_C_AND_FORTRAN_WRAPPERS=OFF",
]

[package.host-dependencies]
python = ">=3.11,<3.14"
numpy = "*"
cython = "*"
swig = ">=4.3"
doxygen = "*"
cmake = ">=3.17,<4.0"
setuptools = "*"
wheel = "*"
pip = "*"

[package.run-dependencies]
python = ">=3.11,<3.14"
numpy = "*"

# Linux CUDA + OpenCL dev libraries (required for CMake configure)
[package.target.linux-64.host-dependencies]
cuda-cudart-dev = "*"
cuda-nvrtc-dev = "*"
cuda-nvcc = "*"
libcufft-dev = "*"
cuda-cupti-dev = "*"
cuda-profiler-api = "*"
opencl-headers = "*"
ocl-icd = "*"

# ---------------------------------------------------------------------------
# Per-platform build overrides (extra-args/compilers REPLACE base config)
# ---------------------------------------------------------------------------
[package.build.target.linux-64.config]
compilers = ["c", "cxx", "cuda"]
env = { CUDA_HOME = "$PREFIX", CUDA_PATH = "$PREFIX" }
extra-args = [
    "-DCMAKE_BUILD_TYPE=Release",
    "-DBUILD_TESTING=OFF",
    "-DCUDAToolkit_ROOT=$PREFIX",
    "-DOPENMM_BUILD_PYTHON_WRAPPERS=ON",
    "-DOPENMM_PYTHON_INSTALL_TO_SITEPACKAGES=ON",
    "-DOPENMM_BUILD_SHARED_LIB=ON",
    "-DOPENMM_BUILD_CPU_LIB=ON",
    "-DOPENMM_BUILD_CUDA_LIB=ON",
    "-DOPENMM_BUILD_OPENCL_LIB=ON",
    "-DOPENMM_BUILD_AMOEBA_PLUGIN=ON",
    "-DOPENMM_BUILD_RPMD_PLUGIN=ON",
    "-DOPENMM_BUILD_DRUDE_PLUGIN=ON",
    "-DOPENMM_BUILD_PME_PLUGIN=ON",
    "-DOPENMM_BUILD_EXAMPLES=OFF",
    "-DOPENMM_BUILD_REFERENCE_TESTS=OFF",
    "-DOPENMM_BUILD_C_AND_FORTRAN_WRAPPERS=OFF",
]

[package.build.target.win-64.config]
compilers = ["c", "cxx", "cuda"]
extra-args = [
    "-DCMAKE_BUILD_TYPE=Release",
    "-DBUILD_TESTING=OFF",
    "-DOPENMM_BUILD_PYTHON_WRAPPERS=ON",
    "-DOPENMM_PYTHON_INSTALL_TO_SITEPACKAGES=ON",
    "-DOPENMM_BUILD_SHARED_LIB=ON",
    "-DOPENMM_BUILD_CPU_LIB=ON",
    "-DOPENMM_BUILD_CUDA_LIB=ON",
    "-DOPENMM_BUILD_OPENCL_LIB=ON",
    "-DOPENMM_BUILD_AMOEBA_PLUGIN=ON",
    "-DOPENMM_BUILD_RPMD_PLUGIN=ON",
    "-DOPENMM_BUILD_DRUDE_PLUGIN=ON",
    "-DOPENMM_BUILD_PME_PLUGIN=ON",
    "-DOPENMM_BUILD_EXAMPLES=OFF",
    "-DOPENMM_BUILD_REFERENCE_TESTS=OFF",
    "-DOPENMM_BUILD_C_AND_FORTRAN_WRAPPERS=OFF",
]

[package.build.target.osx-64.config]
compilers = ["c", "cxx"]
extra-args = [
    "-DCMAKE_BUILD_TYPE=Release",
    "-DBUILD_TESTING=OFF",
    "-DOPENMM_BUILD_PYTHON_WRAPPERS=ON",
    "-DOPENMM_PYTHON_INSTALL_TO_SITEPACKAGES=ON",
    "-DOPENMM_BUILD_SHARED_LIB=ON",
    "-DOPENMM_BUILD_CPU_LIB=ON",
    "-DOPENMM_BUILD_CUDA_LIB=OFF",
    "-DOPENMM_BUILD_OPENCL_LIB=OFF",
    "-DOPENMM_BUILD_AMOEBA_PLUGIN=ON",
    "-DOPENMM_BUILD_RPMD_PLUGIN=ON",
    "-DOPENMM_BUILD_DRUDE_PLUGIN=ON",
    "-DOPENMM_BUILD_PME_PLUGIN=ON",
    "-DOPENMM_BUILD_EXAMPLES=OFF",
    "-DOPENMM_BUILD_REFERENCE_TESTS=OFF",
    "-DOPENMM_BUILD_C_AND_FORTRAN_WRAPPERS=OFF",
]

[package.build.target.osx-arm64.config]
compilers = ["c", "cxx"]
extra-args = [
    "-DCMAKE_BUILD_TYPE=Release",
    "-DBUILD_TESTING=OFF",
    "-DOPENMM_BUILD_PYTHON_WRAPPERS=ON",
    "-DOPENMM_PYTHON_INSTALL_TO_SITEPACKAGES=ON",
    "-DOPENMM_BUILD_SHARED_LIB=ON",
    "-DOPENMM_BUILD_CPU_LIB=ON",
    "-DOPENMM_BUILD_CUDA_LIB=OFF",
    "-DOPENMM_BUILD_OPENCL_LIB=OFF",
    "-DOPENMM_BUILD_AMOEBA_PLUGIN=ON",
    "-DOPENMM_BUILD_RPMD_PLUGIN=ON",
    "-DOPENMM_BUILD_DRUDE_PLUGIN=ON",
    "-DOPENMM_BUILD_PME_PLUGIN=ON",
    "-DOPENMM_BUILD_EXAMPLES=OFF",
    "-DOPENMM_BUILD_REFERENCE_TESTS=OFF",
    "-DOPENMM_BUILD_C_AND_FORTRAN_WRAPPERS=OFF",
]

# CUDA / OpenCL libraries are pulled in automatically by the `cuda` compiler
# (pixi-build-cmake) and conda-forge run-exports when building on linux-64/win-64.
# OpenCL on Linux: add ocl-icd-system at workspace level if needed for runtime tests.

# ---------------------------------------------------------------------------
# Optional feature environments
# ---------------------------------------------------------------------------
[feature.test.dependencies]
pytest = "*"
pytest-xdist = "*"
pytest-timeout = "*"
scipy = "*"
matplotlib = "*"
pandas = "*"

[feature.test.tasks]
smoke = "python -m openmm.testInstallation"
fix-cuda = "bash scripts/rebuild_cuda_plugin.sh"
test-py = "python -m pytest -v wrappers/python/tests/TestCavityMDControllers.py tests/rpmd/ openmm-ml/test/TestCavityMLIP.py --ignore=tests/rpmd/test_uma_hybrid_rpmd_cavity.py -x"
test-cpp = "bash scripts/build_and_test_cpp.sh"
figure5 = "bash examples/cavity/c2f_protocol/run_figure5.sh"
calibrate-fictive = "python examples/cavity/c2f_protocol/run_fictive_calibration.py"
calibrate-fictive-quick = "python examples/cavity/c2f_protocol/run_fictive_calibration.py --quick"

[feature.ml.dependencies]
python = ">=3.11,<3.14"
pip = "*"

[feature.ml.pypi-dependencies]
openmmml = { path = "openmm-ml", editable = true }

[feature.ml.tasks]
install-ml = "pip install -e openmm-ml"
smoke-ml = "python -c \"import openmmml; from openmmml import CavitySpec; print('openmmml OK')\""
test-ml-cavity = "python -m pytest -q openmm-ml/test/TestCavityMLIP.py"

# Full ML stack for CACE/MACE/AIMNet2 integration tests and parity runs.
# Includes cace (LES-BEC water model) and fetch/test tasks for real cavity validation.
[feature.ml-full.dependencies]
python = ">=3.11,<3.14"
pip = "*"
pytorch = ">=2.2"
ase = "*"

[feature.ml-full.pypi-dependencies]
openmmml = { path = "openmm-ml", editable = true }
fairchem-core = "*"
mace-torch = "*"
cace = "*"

[feature.ml-full.tasks]
install-ml-full = "pip install -e openmm-ml && pip install fairchem-core mace-torch cace || true"
# Fetch the LES-BEC water model submodule and export the checkpoint path.
# Usage: pixi run -e ml-full fetch-les-bec
fetch-les-bec = { cmd = "git submodule update --init LES-BEC && export OPENMMML_LES_BEC_WATER_MODEL=$(pwd)/LES-BEC/water/fit/fit_version_4/best_model.pth && echo \"Set OPENMMML_LES_BEC_WATER_MODEL=$OPENMMML_LES_BEC_WATER_MODEL\"" }
# Run real CACE+cavity trajectory tests (requires LES-BEC checkpoint via fetch-les-bec).
test-ml-cavity-real = { cmd = "python -m pytest -v tests/cavity_mlip/test_cace_cavity_trajectory.py", depends-on = ["fetch-les-bec"] }
# Full ML test suite (unit + RPMD + real CACE trajectory).
test-ml-full = "python -m pytest -q openmm-ml/test/TestCavityMLIP.py tests/rpmd/test_rpmd_cavity_integration.py tests/cavity_mlip/"

[feature.docs.dependencies]
sphinx = "*"
doxygen = "*"

[feature.docs.tasks]
docs = "echo 'Run sphinx from build/docs-source after configuring with -DOPENMM_GENERATE_API_DOCS=ON'"

[environments]
default = { features = [] }
test = { features = ["test"] }
ml = { features = ["ml", "test"] }
ml-full = { features = ["ml-full", "test"] }
docs = { features = ["docs"] }
